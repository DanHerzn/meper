<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¿Me perdonas?</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fdfbfb 0%, #f4eae6 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow: hidden;
            color: #4a4a4a;
            /* Prevents zoom on double tap */
            touch-action: manipulation; 
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            text-align: center;
            width: 90%;
            max-width: 350px;
            min-height: 300px; 
            position: relative; 
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            font-weight: 400;
            margin-top: 10px;
            margin-bottom: 30px;
            font-size: 2.2em;
            letter-spacing: 0.5px;
            color: #5a4a4a;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
            min-height: 50px; 
        }

        button {
            padding: 12px 35px;
            font-size: 1.1em;
            font-family: inherit;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            touch-action: manipulation; 
        }

        #btn-si {
            background-color: #d4a3a3;
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(212, 163, 163, 0.4);
            z-index: 20;
        }

        #btn-si:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(212, 163, 163, 0.3);
        }

        #btn-no {
            background-color: transparent;
            color: #999;
            border: 1px solid #ddd;
            position: relative;
            z-index: 50; 
            /* Hardware acceleration to prevent mobile flickering */
            transform: translateZ(0);
        }

        #message {
            display: none;
            margin-top: 40px;
            font-size: 1.5em;
            color: #6b5b5b;
            font-style: italic;
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h1 id="question">¿Me perdonas?</h1>
        <div class="buttons" id="btn-container">
            <button id="btn-si">Sí</button>
            <button id="btn-no">No</button>
        </div>
        <div id="message">Entonces contéstame porfis... 🥺</div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnSi = document.getElementById('btn-si');
        const message = document.getElementById('message');
        const card = document.getElementById('main-card');

        function moveButton() {
            // Free the button from the layout so it can move anywhere inside the card
            btnNo.style.position = 'absolute';
            btnNo.style.transition = 'left 0.3s ease-out, top 0.3s ease-out';
            
            // Define the safe area inside the white card
            const padding = 20; 
            
            // Calculate the maximum X and Y allowed (Math.max prevents negative numbers on very small screens)
            const maxLeft = Math.max(padding, card.clientWidth - btnNo.offsetWidth - padding);
            const maxTop = Math.max(padding, card.clientHeight - btnNo.offsetHeight - padding);
            
            // Generate a random position strictly within the safe boundaries
            const randomX = Math.floor(Math.random() * (maxLeft - padding + 1)) + padding;
            const randomY = Math.floor(Math.random() * (maxTop - padding + 1)) + padding;
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // DESKTOP: Run away when the mouse hovers over it
        btnNo.addEventListener('mouseenter', function(e) {
            // Only trigger hover if the device actually has a mouse cursor
            if (window.matchMedia("(hover: hover)").matches) {
                moveButton();
            }
        });

        // MOBILE & DESKTOP: Run away if they actually manage to tap/click it
        btnNo.addEventListener('click', function(e) {
            moveButton();
        });

        // Success Action
        btnSi.addEventListener('click', () => {
            message.style.display = 'block';
        });
    </script>
</body>
</html>
