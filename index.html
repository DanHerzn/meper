<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¿Me perdonas?</title>
    <style>
        /* Soft, warm gradient background */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fdfbfb 0%, #f4eae6 100%);
            font-family: 'Georgia', 'Times New Roman', serif; /* Elegant, letter-like font */
            overflow: hidden;
            color: #4a4a4a;
        }

        /* Glassmorphism card effect */
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            text-align: center;
            max-width: 85%;
            width: 320px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-weight: 400;
            margin-bottom: 35px;
            font-size: 2.2em;
            letter-spacing: 0.5px;
            color: #5a4a4a;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.1em;
            font-family: inherit;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Gentle rose color for the 'Yes' button */
        #btn-si {
            background-color: #d4a3a3;
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(212, 163, 163, 0.4);
        }

        #btn-si:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(212, 163, 163, 0.3);
        }

        /* Understated, subtle 'No' button */
        #btn-no {
            background-color: transparent;
            color: #999;
            border: 1px solid #ddd;
            position: relative;
        }

        /* The final message style */
        #message {
            display: none;
            font-size: 1.6em;
            color: #6b5b5b;
            font-style: italic;
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h1 id="question">¿Me perdonas?</h1>
        <div class="buttons" id="btn-container">
            <button id="btn-si">Sí</button>
            <button id="btn-no">No</button>
        </div>
        <div id="message">Entonces contéstame porfis...</div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnSi = document.getElementById('btn-si');
        const message = document.getElementById('message');
        const question = document.getElementById('question');
        const btnContainer = document.getElementById('btn-container');

        function moveButton(e) {
            if (e.type === 'touchstart') {
                e.preventDefault();
            }

            // Smoothly pop out of the normal layout
            btnNo.style.position = 'fixed';
            btnNo.style.transition = 'left 0.4s ease-out, top 0.4s ease-out';
            
            const maxX = window.innerWidth - btnNo.offsetWidth;
            const maxY = window.innerHeight - btnNo.offsetHeight;
            
            const randomX = Math.max(20, Math.floor(Math.random() * (maxX - 20)));
            const randomY = Math.max(20, Math.floor(Math.random() * (maxY - 20)));
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        btnNo.addEventListener('mouseover', moveButton);
        btnNo.addEventListener('touchstart', moveButton);

        btnSi.addEventListener('click', () => {
            question.style.display = 'none';
            btnContainer.style.display = 'none';
            btnNo.style.display = 'none';
            
            message.style.display = 'block';
        });
    </script>
</body>
</html>
