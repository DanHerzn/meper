<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¿Me perdonas?</title>
    <style>
        /* Fixes padding calculation issues */
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fdfbfb 0%, #f4eae6 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow: hidden;
            color: #4a4a4a;
            /* Completely disables accidental double-tap zooming on mobile */
            touch-action: manipulation; 
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            text-align: center;
            width: 90%;
            max-width: 350px;
            min-height: 300px; /* Ensures plenty of room */
            position: relative; 
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            /* Prevents text from turning blue when tapped rapidly */
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            font-weight: 400;
            margin-top: 10px;
            margin-bottom: 30px;
            font-size: 2.2em;
            letter-spacing: 0.5px;
            color: #5a4a4a;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
            min-height: 50px; 
        }

        button {
            padding: 12px 35px;
            font-size: 1.1em;
            font-family: inherit;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            touch-action: manipulation; 
        }

        #btn-si {
            background-color: #d4a3a3;
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(212, 163, 163, 0.4);
            z-index: 20;
        }

        #btn-si:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(212, 163, 163, 0.3);
        }

        #btn-no {
            background-color: transparent;
            color: #999;
            border: 1px solid #ddd;
            position: relative;
            z-index: 50; 
            /* Forces mobile browsers to render this on a separate hardware layer so it NEVER vanishes */
            transform: translateZ(0);
            will-change: top, left;
        }

        #message {
            display: none;
            margin-top: 40px;
            font-size: 1.5em;
            color: #6b5b5b;
            font-style: italic;
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h1 id="question">¿Me perdonas?</h1>
        <div class="buttons" id="btn-container">
            <button id="btn-si">Sí</button>
            <button id="btn-no">No</button>
        </div>
        <div id="message">Entonces contéstame porfis... 🥺</div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnSi = document.getElementById('btn-si');
        const message = document.getElementById('message');
        const card = document.getElementById('main-card');

        function moveButton(e) {
            // Prevent duplicate ghost clicks on mobile screens
            if (e.type === 'touchstart') {
                e.preventDefault();
            }

            // Lock it out of the normal layout flow so it can move freely
            if (btnNo.style.position !== 'absolute') {
                btnNo.style.position = 'absolute';
            }

            btnNo.style.transition = 'left 0.3s ease-out, top 0.3s ease-out';
            
            const margin = 20; // 20px padding from the very edge of the card
            
            // Calculate absolute boundaries (using Math.max to prevent negative numbers on tiny screens)
            const maxX = Math.max(0, card.clientWidth - btnNo.offsetWidth - margin);
            const maxY = Math.max(0, card.clientHeight - btnNo.offsetHeight - margin);
            
            // Generate coordinates strictly between [margin] and [maxX/maxY]
            const randomX = Math.floor(Math.random() * (maxX - margin + 1)) + margin;
            const randomY = Math.floor(Math.random() * (maxY - margin + 1)) + margin;
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // Listens for both desktop clicks and mobile taps
        btnNo.addEventListener('click', moveButton);
        btnNo.addEventListener('touchstart', moveButton, { passive: false });

        btnSi.addEventListener('click', () => {
            message.style.display = 'block';
        });
    </script>
</body>
</html>
